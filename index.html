<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress & Impress | Exclusive Couture</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --black: #0e0e0e;
            --white: #ffffff;
            --cream: #fdfcfb;
            --navy: rgba(0, 15, 35, 0.9);
            --transition: all 0.7s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--cream); 
            color: var(--black);
            overflow-x: hidden;
        }

        h1, h2, h3, .logo { font-family: 'Bodoni Moda', serif; font-weight: 400; text-transform: uppercase; letter-spacing: 4px; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(253, 252, 251, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo { font-size: 2rem; cursor: pointer; user-select: none; }
        .nav-links a { 
            text-decoration: none; color: rgba(0,0,0,0.4); 
            margin-left: 35px; font-size: 0.7rem; 
            letter-spacing: 2px; transition: var(--transition);
            position: relative;
        }
        .nav-links a.active { color: var(--black); font-weight: 500; }
        .nav-links a.active::after {
            content: ''; position: absolute; bottom: -5px; left: 0;
            width: 100%; height: 1px; background: var(--gold);
        }

        /* Hero */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            background: var(--white);
            position: relative;
        }
        .hero-video-bg { position: absolute; right: 0; top: 0; width: 65%; height: 100%; }
        .hero-video-bg video { width: 100%; height: 100%; object-fit: cover; }
        .hero-text { position: relative; z-index: 10; padding: 0 10%; width: 50%; }
        .hero-text h1 { font-size: 5rem; line-height: 0.85; margin-bottom: 20px; }

        /* General Section Styling */
        section { padding: 140px 5%; display: none; min-height: 100vh; }
        section.active { display: block; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Instagram Style Grid */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); 
            gap: 60px 30px; 
        }

        .insta-post {
            cursor: pointer;
            position: relative;
            background: var(--white);
        }

        .insta-image-wrapper {
            width: 100%;
            aspect-ratio: 4 / 5;
            overflow: hidden;
            position: relative;
            background: #f0f0f0;
        }

        .insta-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s ease;
        }

        .insta-post:hover img { transform: scale(1.05); }

        .insta-overlay {
            position: absolute; inset: 0;
            background: var(--navy);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: var(--transition);
            color: white; text-align: center;
        }
        .insta-post:hover .insta-overlay { opacity: 1; }

        .multi-indicator {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.8); padding: 5px 10px;
            font-size: 10px; color: black; border-radius: 4px;
        }

        /* FYD Reels */
        .reels-container {
            max-width: 450px; margin: 0 auto;
            height: 80vh; overflow-y: scroll;
            scroll-snap-type: y mandatory;
            border-radius: 20px; border: 5px solid #111;
        }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-unit { height: 100%; scroll-snap-align: start; position: relative; background: #000; }
        .reel-unit video { width: 100%; height: 100%; object-fit: cover; }

        .cta-black {
            padding: 20px 50px; background: var(--black); color: white;
            border: none; letter-spacing: 4px; cursor: pointer; transition: var(--transition);
            text-transform: uppercase; font-size: 0.7rem; display: inline-block; text-decoration: none;
        }
        .cta-black:hover { background: var(--gold); }

        /* Admin UI */
        #adminTools { position: fixed; bottom: 30px; right: 30px; z-index: 2000; display: none; flex-direction: column; gap: 15px; }
        .admin-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: var(--gold); color: white; font-size: 24px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* Modal */
        .modal { position: fixed; inset: 0; background: var(--white); z-index: 3000; display: none; padding: 80px 5% 40px; overflow-y: auto; }
        .close-modal { position: fixed; top: 30px; right: 5%; font-size: 40px; cursor: pointer; z-index: 3001; }
        .chic-input { width: 100%; padding: 20px; border: none; border-bottom: 1px solid #ddd; background: transparent; margin-bottom: 20px; font-family: inherit; outline: none; transition: 0.3s; }

    </style>
</head>
<body>

    <nav>
        <div class="logo" id="adminLock">D&I</div>
        <div class="nav-links">
            <a href="#" onclick="showSection('home')" id="link-home">Home</a>
            <a href="#" onclick="showSection('gallery')" id="link-gallery">Collection</a>
            <a href="#" onclick="showSection('fyd')" id="link-fyd">For Your Dress</a>
            <a href="https://wa.me/96170196337" target="_blank" style="color:var(--gold) !important; opacity:1 !important;">Book Fitting</a>
        </div>
    </nav>

    <div id="adminTools">
        <button class="admin-btn" onclick="openModal('addPostModal')">+</button>
        <button class="admin-btn" style="background:#000" onclick="openModal('addReelModal')">🎥</button>
    </div>

    <section id="home" class="active" style="padding:0;">
        <div class="hero">
            <div class="hero-text">
                <p style="letter-spacing:10px; font-size:0.7rem; margin-bottom:20px;">BOUTIQUE LUXE</p>
                <h1>Dress &<br>Impress</h1>
                <button class="cta-black" style="margin-top:40px;" onclick="showSection('gallery')">View Collection</button>
            </div>
            <div class="hero-video-bg">
                <video autoplay muted loop playsinline>
                    <source src="https://assets.mixkit.co/videos/preview/mixkit-fashion-model-walking-on-a-black-background-34448-large.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </section>

    <section id="gallery">
        <h2 style="font-size: 3rem; text-align: center; margin-bottom: 80px;">The Collection</h2>
        <div class="gallery-grid" id="dressContainer"></div>
    </section>

    <section id="fyd">
        <h2 style="text-align:center; color:var(--gold); margin-bottom:50px;">For Your Dress</h2>
        <div class="reels-container" id="videoFeed"></div>
    </section>

    <div id="addPostModal" class="modal">
        <span class="close-modal" onclick="closeModals()">&times;</span>
        <h2>New Dress Entry</h2><br>
        <input type="text" id="dName" placeholder="DRESS NAME" class="chic-input">
        <textarea id="dDesc" placeholder="DESCRIPTION" class="chic-input"></textarea>
        <input type="file" id="dFiles" multiple accept="image/*"><br><br>
        <button class="cta-black" onclick="saveDress()">Upload Collection</button>
    </div>

    <div id="addReelModal" class="modal">
        <span class="close-modal" onclick="closeModals()">&times;</span>
        <h2>Upload Video Reel</h2><br>
        <input type="file" id="vFile" accept="video/*"><br><br>
        <button class="cta-black" onclick="saveVideo()">Publish Reel</button>
    </div>

    <div id="viewerModal" class="modal">
        <span class="close-modal" onclick="closeModals()">&times;</span>
        <div id="viewerContent"></div>
    </div>

    <footer style="padding: 100px 5%; background: #000; color: white; text-align: center;">
        <h2 style="color:var(--gold); margin-bottom: 20px;">DRESS & IMPRESS</h2>
        <div style="margin-bottom: 40px;">
            <a href="https://www.instagram.com/dress.impress.lb" style="color:white; text-decoration:none; margin:0 20px; font-size:0.8rem;">INSTAGRAM</a>
            <a href="https://www.tiktok.com/@dressimpress13" style="color:white; text-decoration:none; margin:0 20px; font-size:0.8rem;">TIKTOK</a>
        </div>
        <p style="font-size: 0.6rem; opacity: 0.3;">DESIGNED BY <a href="https://www.instagram.com/brand_up_lb" style="color:var(--gold);">BRAND UP</a></p>
    </footer>

    <script>
        let clickCount = 0;
        let isAdmin = false;

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            if(document.getElementById('link-'+id)) document.getElementById('link-'+id).classList.add('active');
            window.scrollTo(0,0);
        }

        document.getElementById('adminLock').addEventListener('click', () => {
            clickCount++;
            if (clickCount === 6) {
                isAdmin = true;
                document.getElementById('adminTools').style.display = 'flex';
                alert("Boutique Master Mode: ON");
                refreshAll();
            }
        });

        async function toB64(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        async function saveDress() {
            const name = document.getElementById('dName').value;
            const desc = document.getElementById('dDesc').value;
            const files = document.getElementById('dFiles').files;
            if(!name || files.length === 0) return;
            const imgs = [];
            for (let f of files) imgs.push(await toB64(f));
            const data = JSON.parse(localStorage.getItem('di_posts') || '[]');
            data.push({ id: Date.now(), name, desc, imgs });
            localStorage.setItem('di_posts', JSON.stringify(data));
            closeModals(); renderDresses();
        }

        function renderDresses() {
            const container = document.getElementById('dressContainer');
            const items = JSON.parse(localStorage.getItem('di_posts') || '[]');
            container.innerHTML = items.map(item => `
                <div class="insta-post" onclick="openDress(${item.id})">
                    <div class="insta-image-wrapper">
                        <img src="${item.imgs[0]}">
                        <div class="insta-overlay">
                            <h3>${item.name}</h3>
                            <p style="margin-top:10px; font-size:0.7rem; letter-spacing:2px;">TAP TO VIEW ALL</p>
                        </div>
                        <div class="multi-indicator">1 / ${item.imgs.length}</div>
                    </div>
                    ${isAdmin ? `<button onclick="deleteMe(event, ${item.id}, 'di_posts')" style="position:absolute; bottom:10px; right:10px; background:red; color:white; border:none; padding:5px; z-index:10;">Delete</button>` : ''}
                </div>
            `).join('');
        }

        function openDress(id) {
            const item = JSON.parse(localStorage.getItem('di_posts') || '[]').find(x => x.id === id);
            document.getElementById('viewerContent').innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <div style="width:100%; display:flex; gap:20px; overflow-x:auto; padding-bottom:30px;">
                        ${item.imgs.map(img => `<img src="${img}" style="height:85vh; aspect-ratio:4/5; object-fit:cover; flex-shrink:0;">`).join('')}
                    </div>
                    <div style="max-width:700px; text-align:center; padding-top:40px;">
                        <h2 style="font-size:3.5rem; margin-bottom:20px;">${item.name}</h2>
                        <p style="font-size:1.1rem; line-height:1.8; margin-bottom:40px;">${item.desc}</p>
                        <a href="https://wa.me/96170196337" class="cta-black">Book this Look</a>
                    </div>
                </div>`;
            openModal('viewerModal');
        }

        async function saveVideo() {
            const file = document.getElementById('vFile').files[0];
            if(!file) return;
            const b64 = await toB64(file);
            const vids = JSON.parse(localStorage.getItem('di_reels') || '[]');
            vids.push({ id: Date.now(), src: b64 });
            localStorage.setItem('di_reels', JSON.stringify(vids));
            closeModals(); renderVideos();
        }

        function renderVideos() {
            const feed = document.getElementById('videoFeed');
            const vids = JSON.parse(localStorage.getItem('di_reels') || '[]');
            feed.innerHTML = vids.map(v => `
                <div class="reel-unit">
                    <video src="${v.src}" loop onclick="this.paused?this.play():this.pause()"></video>
                    ${isAdmin ? `<button onclick="deleteMe(event, ${v.id}, 'di_reels')" style="position:absolute; top:20px; right:20px; background:red; color:white; border:none; padding:10px;">Delete</button>` : ''}
                </div>`).join('');
        }

        function deleteMe(e, id, key) {
            e.stopPropagation();
            if(!confirm("Are you sure?")) return;
            let items = JSON.parse(localStorage.getItem(key) || '[]');
            items = items.filter(x => x.id !== id);
            localStorage.setItem(key, JSON.stringify(items));
            refreshAll();
        }

        function refreshAll() { renderDresses(); renderVideos(); }
        window.onload = () => { refreshAll(); document.getElementById('link-home').classList.add('active'); };
    </script>
</body>
</html>
