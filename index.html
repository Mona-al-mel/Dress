<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>Dress & Impress | Exclusive</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #0e0e0e; --white: #ffffff; --cream: #fdfcfb; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--cream); 
            color: var(--black); 
            min-width: 1200px; /* نثبت العرض ليمنع العناصر من النزول تحت بعضها */
        }

        /* Navigation - سيبقى دائماً صف واحد */
        nav {
            position: fixed; top: 0; width: 100%; height: 90px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; z-index: 1000; border-bottom: 1px solid #eee;
        }
        .logo { font-family: 'Bodoni Moda'; font-size: 2rem; font-weight: bold; cursor: pointer; letter-spacing: 3px; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { 
            text-decoration: none; color: #666; font-size: 0.8rem; 
            font-weight: 600; letter-spacing: 2px; margin-left: 40px;
            transition: 0.3s;
        }
        .nav-links a.active { color: var(--black); border-bottom: 2px solid var(--gold); }

        /* Hero - ثابت المساحة */
        .hero { 
            position: relative; height: 100vh; width: 100%; 
            display: flex; align-items: center; overflow: hidden; background: #fff;
        }
        .hero-video { position: absolute; right: 0; width: 60%; height: 100%; object-fit: cover; z-index: 1; }
        .hero-content { position: relative; z-index: 2; padding-left: 100px; width: 45%; }
        .hero-content h1 { font-family: 'Bodoni Moda'; font-size: 5rem; line-height: 0.9; margin-bottom: 20px; }
        .hero-content p { font-size: 0.9rem; letter-spacing: 8px; margin-bottom: 40px; }

        /* Sections */
        section { padding: 140px 100px 60px; display: none; min-height: 100vh; }
        section.active { display: block; }

        /* Collection Grid - دائماً 3 أو 4 أعمدة بجانب بعضها */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 30px; width: 100%;
        }

        .card { background: white; overflow: hidden; position: relative; transition: 0.5s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; }
        .card-info { padding: 20px; font-size: 1rem; font-weight: 600; text-align: center; border: 1px solid #eee; border-top: none; }

        /* FYD Reels - شكل الكاروسيل الأفقي مثل لابتوب */
        .reels-box {
            width: 100%; max-width: 1000px; margin: 0 auto; 
            height: 80vh; background: #000; border-radius: 10px;
            overflow-y: scroll; scroll-snap-type: y mandatory;
        }
        .reels-box::-webkit-scrollbar { display: none; }
        .reel { height: 100%; width: 100%; scroll-snap-align: start; position: relative; }
        .reel video { width: 100%; height: 100%; object-fit: contain; }

        .btn { 
            padding: 18px 40px; background: var(--black); color: white; border: none; 
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; cursor: pointer; text-decoration: none;
        }

        /* Footer - يبقى صف واحد */
        footer { background: #000; color: white; padding: 80px 100px; text-align: center; }
        .social { margin-bottom: 30px; }
        .social a { color: white; text-decoration: none; margin: 0 25px; font-size: 0.9rem; letter-spacing: 2px; }
        .brand { margin-top: 50px; font-size: 0.7rem; opacity: 0.5; }
        .brand a { color: var(--gold); text-decoration: none; }

        /* Admin & Modals */
        .admin-float { position: fixed; bottom: 40px; right: 40px; z-index: 2000; display: none; gap: 15px; }
        .btn-round { width: 65px; height: 65px; border-radius: 50%; background: var(--gold); border: none; color: white; font-size: 24px; cursor: pointer; }
        .modal { position: fixed; inset: 0; background: white; z-index: 3000; display: none; padding: 100px; overflow-y: auto; }
        .close { font-size: 50px; position: absolute; top: 30px; right: 50px; cursor: pointer; }
        input, textarea { width: 100%; padding: 20px; margin-bottom: 20px; border: 1px solid #ddd; font-size: 1rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" id="unlock">D&I</div>
        <div class="nav-links">
            <a href="#" onclick="show('home')" id="l-home" class="active">HOME</a>
            <a href="#" onclick="show('gallery')" id="l-gallery">COLLECTION</a>
            <a href="#" onclick="show('fyd')" id="l-fyd">FOR YOUR DRESS</a>
            <a href="https://wa.me/96170196337" style="color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; margin-left: 20px;">BOOK FITTING</a>
        </div>
    </nav>

    <div class="admin-float" id="adminUI">
        <button class="btn-round" onclick="openM('dressM')">+</button>
        <button class="btn-round" style="background: #000" onclick="openM('reelM')">🎥</button>
    </div>

    <section id="home" class="active" style="padding:0;">
        <div class="hero">
            <div class="hero-content">
                <p>EXCLUSIVE COUTURE</p>
                <h1>Dress &<br>Impress</h1>
                <button class="btn" onclick="show('gallery')" style="margin-top: 30px;">View Collection</button>
            </div>
            <video class="hero-video" autoplay muted loop playsinline>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-fashion-model-walking-on-a-black-background-34448-large.mp4" type="video/mp4">
            </video>
        </div>
    </section>

    <section id="gallery">
        <h2 style="text-align: center; margin-bottom: 60px; font-family: 'Bodoni Moda'; font-size: 3rem;">The Collection</h2>
        <div class="grid" id="dressG"></div>
    </section>

    <section id="fyd">
        <h2 style="text-align: center; margin-bottom: 50px; color: var(--gold); font-family: 'Bodoni Moda'; font-size: 3rem;">For Your Dress</h2>
        <div class="reels-box" id="reelG"></div>
    </section>

    <footer>
        <h3 style="font-family: 'Bodoni Moda'; color: var(--gold); font-size: 2rem; margin-bottom: 30px;">DRESS & IMPRESS</h3>
        <div class="social">
            <a href="https://www.instagram.com/dress.impress.lb" target="_blank">INSTAGRAM</a>
            <a href="https://www.tiktok.com/@dressimpress13" target="_blank">TIKTOK</a>
        </div>
        <div class="brand">
            DESIGNED BY <a href="https://www.instagram.com/brand_up_lb" target="_blank">BRAND UP</a>
        </div>
    </footer>

    <div id="dressM" class="modal"><span class="close" onclick="closeM()">×</span>
        <h2>Add New Dress</h2><br>
        <input type="text" id="dN" placeholder="Dress Name">
        <textarea id="dD" placeholder="Description"></textarea>
        <input type="file" id="dI" multiple accept="image/*">
        <button class="btn" onclick="saveD()">Upload to Collection</button>
    </div>

    <div id="reelM" class="modal"><span class="close" onclick="closeM()">×</span>
        <h2>Add Video Reel</h2><br>
        <input type="file" id="vI" accept="video/*">
        <button class="btn" onclick="saveV()">Publish Reel</button>
    </div>

    <div id="viewM" class="modal"><span class="close" onclick="closeM()">×</span><div id="viewC"></div></div>

    <script>
        let admin = false; let clicks = 0;
        document.getElementById('unlock').onclick = () => { clicks++; if(clicks==6){ admin=true; document.getElementById('adminUI').style.display='flex'; alert('Admin Mode ON'); refresh(); }};

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById('l-'+id).classList.add('active');
            window.scrollTo(0,0);
        }

        function openM(id) { document.getElementById(id).style.display='block'; }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

        async function toB64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); }); }

        async function saveD() {
            const n=document.getElementById('dN').value, fs=document.getElementById('dI').files;
            if(!n || fs.length==0) return;
            const imgs = []; for(let f of fs) imgs.push(await toB64(f));
            const data = JSON.parse(localStorage.getItem('di_final_d')||'[]');
            data.push({id:Date.now(), n, imgs, d:document.getElementById('dD').value});
            localStorage.setItem('di_final_d', JSON.stringify(data)); closeM(); refresh();
        }

        function renderD() {
            const data = JSON.parse(localStorage.getItem('di_final_d')||'[]');
            document.getElementById('dressG').innerHTML = data.map(i => `
                <div class="card" onclick="openV(${i.id})">
                    <img src="${i.imgs[0]}">
                    <div class="card-info">${i.n}</div>
                    ${admin ? `<button onclick="del(event,${i.id},'di_final_d')" style="position:absolute;top:10px;right:10px;background:red;color:white;border:none;padding:8px;cursor:pointer;">DELETE</button>`:''}
                </div>
            `).join('');
        }

        function openV(id) {
            const i = JSON.parse(localStorage.getItem('di_final_d')||'[]').find(x=>x.id==id);
            document.getElementById('viewC').innerHTML = `
                <div style="display:flex; gap:50px; align-items:start;">
                    <div style="flex:1; display:flex; overflow-x:auto; gap:20px;">
                        ${i.imgs.map(img=>`<img src="${img}" style="height:70vh; border-radius:5px;">`).join('')}
                    </div>
                    <div style="width:400px; padding-top:50px;">
                        <h2 style="font-family:Bodoni Moda; font-size:3rem; margin-bottom:20px;">${i.n}</h2>
                        <p style="margin-bottom:40px; line-height:1.8; color:#444;">${i.d}</p>
                        <a href="https://wa.me/96170196337" class="btn">Inquire Now</a>
                    </div>
                </div>`;
            openM('viewM');
        }

        async function saveV() {
            const f=document.getElementById('vI').files[0]; if(!f) return;
            const b64 = await toB64(f);
            const data = JSON.parse(localStorage.getItem('di_final_v')||'[]');
            data.push({id:Date.now(), s:b64});
            localStorage.setItem('di_final_v', JSON.stringify(data)); closeM(); refresh();
        }

        function renderV() {
            const data = JSON.parse(localStorage.getItem('di_final_v')||'[]');
            document.getElementById('reelG').innerHTML = data.map(v => `
                <div class="reel">
                    <video src="${v.s}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    ${admin ? `<button onclick="del(event,${v.id},'di_final_v')" style="position:absolute;top:30px;right:30px;background:red;color:white;border:none;padding:15px;cursor:pointer;">DELETE VIDEO</button>`:''}
                </div>
            `).join('');
        }

        function del(e, id, k) { e.stopPropagation(); if(confirm('Delete permanently?')){ let d=JSON.parse(localStorage.getItem(k)); d=d.filter(x=>x.id!=id); localStorage.setItem(k,JSON.stringify(d)); refresh(); }}
        function refresh() { renderD(); renderV(); }
        window.onload = refresh;
    </script>
</body>
</html>
