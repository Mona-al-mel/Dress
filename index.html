<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress & Impress | Exclusive Couture</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #0e0e0e; --white: #ffffff; --cream: #fdfcfb; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--cream); color: var(--black); overflow-x: hidden; }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: rgba(253, 252, 251, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-family: 'Bodoni Moda'; font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; }
        .nav-links a { text-decoration: none; color: #555; font-size: 0.7rem; margin-left: 15px; font-weight: 600; letter-spacing: 1px; }
        .nav-links a.active { color: var(--gold); }

        /* Hero Section */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
        .hero-video-bg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        .hero-video-bg video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .hero-text { position: relative; z-index: 2; }
        .hero-text h1 { font-family: 'Bodoni Moda'; font-size: 3rem; text-transform: uppercase; line-height: 1; }
        .hero-text p { font-size: 0.7rem; letter-spacing: 5px; margin-top: 10px; }

        /* Sections */
        section { padding: 100px 20px; display: none; min-height: 100vh; }
        section.active { display: block; }

        /* Gallery */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .insta-post { position: relative; cursor: pointer; border-radius: 8px; overflow: hidden; background: #fff; }
        .insta-post img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; }

        /* FYD - Reels System */
        .reels-container {
            width: 100%; max-width: 400px; margin: 0 auto; 
            height: 75vh; overflow-y: scroll; scroll-snap-type: y mandatory;
            background: #000; border-radius: 20px; border: 5px solid #111;
        }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-unit { height: 100%; width: 100%; scroll-snap-align: start; position: relative; }
        .reel-unit video { width: 100%; height: 100%; object-fit: cover; }

        /* Admin Controls */
        .admin-btn { 
            position: fixed; bottom: 30px; right: 20px; width: 55px; height: 55px; 
            border-radius: 50%; background: var(--gold); color: white; border: none; 
            font-size: 24px; z-index: 2000; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Loading Overlay */
        #loader {
            position: fixed; inset: 0; background: rgba(255,255,255,0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 5000;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modal */
        .modal { position: fixed; inset: 0; background: white; z-index: 3000; display: none; padding: 50px 20px; }
        .close-modal { font-size: 40px; position: absolute; top: 10px; right: 20px; cursor: pointer; }
        .cta-btn { width: 100%; padding: 15px; background: var(--black); color: white; border: none; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; cursor: pointer; }

        /* Footer */
        footer { padding: 60px 20px; background: #000; color: white; text-align: center; }
        .social-links a { color: white; text-decoration: none; margin: 0 15px; font-size: 0.7rem; letter-spacing: 2px; }
        .brand-up { margin-top: 40px; font-size: 0.6rem; opacity: 0.4; }
        .brand-up a { color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: bold; letter-spacing: 1px;">Loading Your Reel...</p>
    </div>

    <nav>
        <div class="logo" id="adminLock">D&I</div>
        <div class="nav-links">
            <a href="#" onclick="showSection('home')" id="l-home" class="active">HOME</a>
            <a href="#" onclick="showSection('gallery')" id="l-gallery">COLLECTION</a>
            <a href="#" onclick="showSection('fyd')" id="l-fyd">FYD</a>
        </div>
    </nav>

    <div id="adminTools">
        <button class="admin-btn" style="bottom: 100px;" onclick="openModal('addDressM')">+</button>
        <button class="admin-btn" onclick="openModal('addReelM')">🎥</button>
    </div>

    <section id="home" class="active" style="padding:0;">
        <div class="hero">
            <div class="hero-video-bg">
                <video autoplay muted loop playsinline>
                    <source src="https://assets.mixkit.co/videos/preview/mixkit-fashion-model-walking-on-a-black-background-34448-large.mp4" type="video/mp4">
                </video>
            </div>
            <div class="hero-text">
                <p>EXCLUSIVE COUTURE</p>
                <h1>DRESS &<br>IMPRESS</h1>
                <button onclick="showSection('gallery')" style="margin-top:20px; background:none; border:1px solid black; padding:10px 20px; letter-spacing:2px; font-size:0.7rem; cursor:pointer;">EXPLORE</button>
            </div>
        </div>
    </section>

    <section id="gallery">
        <h2 style="text-align:center; margin-bottom:40px; font-family:'Bodoni Moda';">The Collection</h2>
        <div class="gallery-grid" id="dressContainer"></div>
    </section>

    <section id="fyd">
        <h2 style="text-align:center; margin-bottom:30px; font-family:'Bodoni Moda'; color:var(--gold);">For Your Dress</h2>
        <div class="reels-container" id="videoFeed"></div>
    </section>

    <footer>
        <h2 style="font-family: 'Bodoni Moda'; color: var(--gold); margin-bottom: 20px;">DRESS & IMPRESS</h2>
        <div class="social-links">
            <a href="https://www.instagram.com/dress.impress.lb" target="_blank">INSTAGRAM</a>
            <a href="https://www.tiktok.com/@dressimpress13" target="_blank">TIKTOK</a>
        </div>
        <div class="brand-up">DESIGNED BY <a href="https://www.instagram.com/brand_up_lb">BRAND UP</a></div>
    </footer>

    <div id="addDressM" class="modal">
        <span class="close-modal" onclick="closeModals()">×</span>
        <h3>Add Dress</h3><br>
        <input type="text" id="dName" placeholder="Name" style="width:100%; padding:15px; margin-bottom:10px;">
        <input type="file" id="dFiles" multiple accept="image/*"><br><br>
        <button class="cta-btn" onclick="saveDress()">Save</button>
    </div>

    <div id="addReelM" class="modal">
        <span class="close-modal" onclick="closeModals()">×</span>
        <h3>Upload Video Reel</h3><br>
        <input type="file" id="vFile" accept="video/*"><br><br>
        <button class="cta-btn" onclick="saveVideo()">Upload Reel</button>
    </div>

    <div id="viewerM" class="modal" style="overflow-y:auto;">
        <span class="close-modal" onclick="closeModals()">×</span>
        <div id="viewerContent"></div>
    </div>

    <script>
        let isAdmin = false; let clicks = 0;
        document.getElementById('adminLock').onclick = () => { clicks++; if(clicks==6){ isAdmin=true; document.querySelectorAll('.admin-btn').forEach(b=>b.style.display='flex'); alert('Admin Mode Active'); refresh(); }};

        function showSection(id) {
            document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
            document.getElementById('l-'+id).classList.add('active');
            window.scrollTo(0,0);
        }

        function openModal(id) { document.getElementById(id).style.display='block'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }

        async function toB64(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
            });
        }

        async function saveDress() {
            const name = document.getElementById('dName').value;
            const files = document.getElementById('dFiles').files;
            if(!name || files.length === 0) return;
            document.getElementById('loader').style.display='flex';
            const imgs = []; for(let f of files) imgs.push(await toB64(f));
            const data = JSON.parse(localStorage.getItem('di_d_v3') || '[]');
            data.push({id: Date.now(), name, imgs});
            localStorage.setItem('di_d_v3', JSON.stringify(data));
            document.getElementById('loader').style.display='none';
            closeModals(); refresh();
        }

        async function saveVideo() {
            const file = document.getElementById('vFile').files[0];
            if(!file) return;
            document.getElementById('loader').style.display='flex';
            const b64 = await toB64(file);
            const vids = JSON.parse(localStorage.getItem('di_v_v3') || '[]');
            vids.push({id: Date.now(), src: b64});
            localStorage.setItem('di_v_v3', JSON.stringify(vids));
            document.getElementById('loader').style.display='none';
            closeModals(); refresh();
        }

        function renderAll() {
            const dresses = JSON.parse(localStorage.getItem('di_d_v3') || '[]');
            document.getElementById('dressContainer').innerHTML = dresses.map(d => `
                <div class="insta-post" onclick="viewDress(${d.id})">
                    <img src="${d.imgs[0]}">
                    ${isAdmin ? `<button onclick="del(event,${d.id},'di_d_v3')" style="position:absolute;top:5px;right:5px;background:red;color:white;border:none;padding:5px;">X</button>` : ''}
                </div>`).join('');

            const vids = JSON.parse(localStorage.getItem('di_v_v3') || '[]');
            document.getElementById('videoFeed').innerHTML = vids.map(v => `
                <div class="reel-unit">
                    <video src="${v.src}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    ${isAdmin ? `<button onclick="del(event,${v.id},'di_v_v3')" style="position:absolute;top:10px;right:10px;background:red;color:white;border:none;padding:10px;">DEL</button>` : ''}
                </div>`).join('');
        }

        function viewDress(id) {
            const d = JSON.parse(localStorage.getItem('di_d_v3') || '[]').find(x=>x.id==id);
            document.getElementById('viewerContent').innerHTML = `
                <div style="text-align:center;">
                    <div style="display:flex; overflow-x:auto; gap:10px;">
                        ${d.imgs.map(img => `<img src="${img}" style="width:80%; border-radius:10px; flex-shrink:0;">`).join('')}
                    </div>
                    <h2 style="margin-top:20px; font-family:Bodoni Moda;">${d.name}</h2>
                    <a href="https://wa.me/96170196337" class="cta-btn" style="display:block; text-decoration:none;">Book via WhatsApp</a>
                </div>`;
            openModal('viewerM');
        }

        function del(e, id, key) { e.stopPropagation(); if(confirm('Delete?')){ let d=JSON.parse(localStorage.getItem(key)); d=d.filter(x=>x.id!=id); localStorage.setItem(key,JSON.stringify(d)); refresh(); }}
        function refresh() { renderAll(); }
        window.onload = refresh;
    </script>
</body>
</html>
